# 指点网络 原型 Nginx 配置(HTTP)。
# 放到 /etc/nginx/conf.d/zhidian.conf,然后 nginx -t && nginx -s reload
# 上线前务必:加 HTTPS + 泛域名证书(见 docs/prototype-stage0.md 第 9 节)。

# ---------- 用户站点:*.<域名> ----------
server {
    listen 80;
    server_name ~^(?<subdomain>[a-z0-9][a-z0-9-]*)\.__DOMAIN__\.?$;

    root /data/sites/$subdomain;
    index index.html;

    location / {
        try_files $uri $uri/ $uri.html =404;
    }

    location ~* \.(jpg|jpeg|png|gif|webp|svg|ico|css|js|woff2?|ttf)$ {
        expires 7d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    add_header X-Content-Type-Options nosniff always;
}

# ---------- 主域名:管理面板 + API ----------
server {
    listen 80;
    server_name __DOMAIN__;

    client_max_body_size 55m;   # 与 MAX_UPLOAD_MB 对齐,略留余量

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
